@switch (viewState()) {
  @case ('loading') {
    <loading />
  }

  @case ('empty') {
    <section class="border-base-300 bg-base-200/50 rounded-3xl border border-dashed p-10 text-center">
      <p class="text-base-content/70">No hay resultados para esta búsqueda.</p>
    </section>
  }

  @default {
    @let items = gifs()!;

    <section class="mb-3 flex items-center gap-2">
      <span class="badge badge-primary badge-lg">{{ items.length }}</span>
      <span class="text-base-content/70 text-sm">
        {{ items.length === 1 ? 'gif encontrado' : 'gifs encontrados' }}
      </span>
    </section>

    <section class="border-base-300 bg-base-100 rounded-3xl border p-3 shadow-sm md:p-5">
      <div (scroll)="onScroll($event)" class="h-[70vh] overflow-x-hidden overflow-y-auto" #groupDiv>
        <div class="columns-2 gap-4 space-y-4 md:columns-3 lg:columns-4 2xl:columns-5">
          @for (gif of items; track gif.id) {
            <gifs-list-item [gif]="gif" class="contents" />
          }
        </div>
      </div>
    </section>
  }
}

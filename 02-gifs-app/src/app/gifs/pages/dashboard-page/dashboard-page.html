<article
  class="min-h-screen bg-slate-950 text-slate-200 antialiased selection:bg-blue-600 selection:text-white"
>
  <a
    href="#main-content"
    class="sr-only focus:not-sr-only focus:fixed focus:top-3 focus:left-3 focus:z-50 focus:rounded-md focus:bg-blue-600 focus:px-3 focus:py-2 focus:text-white"
  >
    Saltar al contenido
  </a>

  <div class="flex min-h-screen w-full">
    <aside
      id="menu"
      aria-label="Barra lateral"
      class="sticky top-0 h-screen w-72 shrink-0 overflow-y-auto border-r border-slate-800 bg-gray-900 text-slate-300"
    >
      <div id="logo" class="px-6 pt-6 pb-4">
        <h1 class="text-xl font-bold tracking-tight text-white md:text-2xl">
          Dash<span class="text-blue-500">8</span>.
        </h1>
        <p class="mt-1 text-sm text-slate-400">Manage your actions and activities</p>
      </div>

      <section id="profile" class="px-6 py-6">
        <p class="text-sm text-slate-400">Welcome back,</p>
        <a
          href="#"
          class="mt-3 inline-flex min-h-11 items-center gap-3 rounded-lg px-2 py-2 transition-colors duration-200 hover:bg-white/5 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
        >
          <img
            class="h-10 w-10 rounded-full object-cover"
            src="https://images.unsplash.com/photo-1542909168-82c3e7fdca5c?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=128&q=80"
            alt="Foto de perfil de Edward Tompson"
            loading="lazy"
          />
          <span class="text-sm font-semibold text-white md:text-base">Edward Tompson</span>
        </a>
      </section>

      <nav id="nav" class="w-full px-4 pb-6" aria-label="Navegación principal">
        <ul class="space-y-2">
          <!-- <li>
            <a
              href="#"
              aria-current="page"
              class="group inline-flex min-h-11 w-full items-center gap-3 rounded-lg border border-blue-700/40 bg-blue-800/80 px-3 py-3 transition-colors duration-200 hover:bg-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
            >
              <span aria-hidden="true" class="text-slate-100">
                <lucide-icon [img]="LayoutPanelTop"></lucide-icon>
              </span>
              <span class="flex flex-col text-left">
                <span class="text-base leading-5 font-semibold text-white">Dashboard</span>
                <span class="text-xs text-blue-100/80">Data Overview</span>
              </span>
            </a>
          </li> -->
          @for (item of menuItems; track $index) {
            <li>
              <a
                [routerLink]="item.path"
                routerLinkActive="bg-blue-700/40 text-white"
                class="group inline-flex min-h-11 w-full items-center gap-3 rounded-lg border border-transparent px-3 py-3 transition-colors duration-200 hover:bg-white/5 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
              >
                <span aria-hidden="true" class="text-slate-100">
                  <lucide-icon [img]="item.icon"></lucide-icon>
                </span>
                <span class="flex flex-col text-left">
                  <span class="text-base leading-5 font-semibold">{{ item.label }}</span>
                  <span class="text-xs text-blue-100/80">{{ item.description }}</span>
                </span>
              </a>
            </li>
          }
          <!-- ...más ítems de navegación -->
        </ul>
      </nav>
    </aside>

    <main id="main-content" class="min-w-0 flex-1">
      <div class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</article>

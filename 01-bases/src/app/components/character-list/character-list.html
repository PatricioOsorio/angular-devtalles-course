<ul class="menu bg-base-100 w-full p-0">
  @for (character of characters(); track character.id; let idx = $index) {
    <li class="rounded-box flex flex-row items-center justify-between">
      <span>{{ idx + 1 }} - {{ character.name }}</span>
      <span
        [ngClass]="{ 'badge-error': character.power >= 9000 }"
        class="badge badge-ghost badge-outline"
        >{{ character.power }}</span
      >
    </li>
  }
</ul>

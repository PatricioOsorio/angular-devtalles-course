<section class="space-y-4">
  <header class="mb-2">
    <h1>Dragon Ball</h1>
    <p class="text-sm opacity-70">Administra guerreros y su poder</p>
  </header>

  <div class="grid gap-4 md:grid-cols-2">
    <section class="card border-base-300 bg-base-100 border shadow-sm">
      <div class="card-body">
        <h2 class="card-title text-lg">Agregar personaje: {{ name() }}</h2>

        <label class="form-control w-full">
          <span class="label-text mb-1 text-sm">Nombre</span>
          <input
            (input)="handleInputName($event)"
            [value]="name()"
            class="input input-bordered w-full"
            type="text"
            placeholder="Ej: Goku"
          />
        </label>

        <label class="form-control w-full">
          <span class="label-text mb-1 text-sm">Poder</span>
          <input
            (input)="handleInputPower($event)"
            [value]="power()"
            class="input input-bordered w-full"
            type="number"
            placeholder="Ej: 9000"
          />
        </label>

        <div class="card-actions justify-end">
          <button (click)="handleAddCharacter()" class="btn btn-primary" type="button">
            Agregar
          </button>
        </div>
      </div>
    </section>

    <section class="card border-base-300 bg-base-100 border shadow-sm">
      <div class="card-body">
        <h2 class="card-title text-lg">Listado</h2>
        <p class="text-sm opacity-70">Total de personajes: {{ characters().length }}</p>

        <ul class="menu bg-base-100 w-full p-0">
          @for (character of characters(); track character.id; let idx = $index) {
            <li class="rounded-box flex flex-row items-center justify-between">
              <span>{{ idx + 1 }} - {{ character.name }}</span>
              <span
                [ngClass]="{ 'badge-error': character.power >= 9000 }"
                class="badge badge-ghost badge-outline"
                >{{ character.power }}</span
              >
            </li>
          }
        </ul>
      </div>
    </section>
  </div>
</section>

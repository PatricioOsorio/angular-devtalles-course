<section class="space-y-4">
  <header class="mb-2">
    <h1>Dragon Ball</h1>
    <p class="text-sm opacity-70">Administra guerreros y su poder</p>
  </header>

  <div class="grid gap-4 md:grid-cols-2">
    <app-card title="Form" description="Agrega un nuevo personaje a la lista">
      <app-character-form (characterAdded)="dragonballService.addCharacter($event)" />
    </app-card>

    <app-card
      title="List"
      description="Total characters: {{ dragonballService.characters().length }}"
    >
      <app-character-list [characters]="dragonballService.characters()" />
    </app-card>
  </div>
</section>

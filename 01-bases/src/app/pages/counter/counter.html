<section class="card gap-4 rounded-md border border-gray-950 p-4 shadow-lg">
  <h2>Counter app</h2>
  <h3 class="text-primary">{{ counter() }}</h3>
  <div class="flex gap-4">
    <button (click)="increaseBy(1)" class="btn btn-primary">+1</button>
    <button (click)="increaseBy(-1)" class="btn btn-primary">-1</button>
  </div>
</section>

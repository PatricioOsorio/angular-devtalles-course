<section class="card border-base-300 bg-base-100 gap-4 border p-6 shadow-md">
  <h1 class="text-3xl">{{ name() }}</h1>

  <dl class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-2">
    <dt class="font-semibold">Nombre:</dt>
    <dd>{{ name() }}</dd>

    <dt class="font-semibold">Edad:</dt>
    <dd>{{ age() }}</dd>

    <dt class="font-semibold">Método:</dt>
    <dd>{{ getHeroDescription() }}</dd>

    <dt class="font-semibold">Capitalizado:</dt>
    <dd>{{ name() | uppercase }}</dd>
  </dl>

  <div class="flex flex-wrap gap-2">
    <button (click)="changeHero()" class="btn btn-primary">Cambiar nombre</button>
    <button (click)="changeAge()" class="btn btn-primary">Cambiar edad</button>
    <button (click)="resetForm()" class="btn btn-outline">Reset</button>
  </div>
</section>

<article class="pipes-showcase">
  <app-page-hero
    titleId="basic-page-title"
    eyebrow="Curso Angular · Pipes"
    title="Transformación de Datos"
    lead="Domina los pipes de Angular: herramientas poderosas para transformar datos directamente en tus plantillas HTML. Explora cada uno con ejemplos interactivos."
    meta="3 pipes base · lowercase · uppercase · titlecase"
  />

  <section class="ps__showcase" aria-label="Demostración de pipes">
    <div class="ps__intro-panel">
      <div class="ps__intro-copy">
        <h2 class="ps__intro-title">Dato Original</h2>
        <p class="ps__intro-source">{{ nameUpper() }}</p>
      </div>
      <p class="ps__intro-helper">
        Observa cómo cada pipe cambia formato y legibilidad sin alterar el valor fuente.
      </p>
    </div>

    <div class="ps__pipes-grid" role="list">
      <app-pipe-card
        title="Lowercase"
        badge="Minúsculas"
        codeLabel="lowercase pipe"
        [value]="nameUpper() | lowercase"
        description="Convierte todo el texto a minúsculas."
      />

      <app-pipe-card
        title="Uppercase"
        badge="Mayúsculas"
        codeLabel="uppercase pipe"
        [value]="nameUpper() | uppercase"
        description="Convierte todo el texto a mayúsculas."
        tone="secondary"
      />

      <app-pipe-card
        title="Titlecase"
        badge="Primera Mayúscula"
        codeLabel="titlecase pipe"
        [value]="fullName() | titlecase"
        description="Convierte la primera letra de cada palabra en mayúscula."
        tone="accent"
      />
    </div>
  </section>
</article>

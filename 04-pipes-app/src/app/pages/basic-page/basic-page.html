<article class="home-page">
  <section class="hp__hero">
    <p class="hp__eyebrow">Curso Angular</p>
    <h1 class="hp__title">Pipes Básicos</h1>
    <p class="hp__lead">
      Pipes incluidos en Angular para transformar datos en plantillas. Aprende a usar
    </p>
  </section>

  <section class="stats shadow w-full">
    <div class="stat">
      <div class="stat-title">Lowercase Pipe</div>
      <div class="stat-value">{{ nameUpper() | lowercase }}</div>
      <div class="stat-desc">{{ nameUpper() }}</div>
    </div>

    <div class="stat">
      <div class="stat-title">Uppercase Pipe</div>
      <div class="stat-value">{{ nameUpper() | uppercase }}</div>
      <div class="stat-desc">{{ nameUpper() }}</div>
    </div>

    <div class="stat">
      <div class="stat-title">Title Case Pipe</div>
      <div class="stat-value">{{ fullName() | titlecase }}</div>
      <div class="stat-desc">{{ fullName() }}</div>
    </div>
  </section>
</article>

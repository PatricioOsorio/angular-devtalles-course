<article class="by-capital-page">
  <country-search-input
    (searched)="onSearch($event)"
    (valueChanged)="onSearchDebounced($event)"
    [initialValue]="searchTerm()"
    textSearch="Capital"
    textPlaceholder="Ej: Santiago, Bogota, Madrid"
    textDescription="Escribe el nombre de una capital para obtener resultados mas precisos, de forma rapida y sin friccion."
  />

  <country-table
    [rows]="countryQuery.data() ?? []"
    [isLoading]="countryQuery.isLoading()"
    [errorMessage]="countryQuery.error()?.message ?? ''"
  />
</article>

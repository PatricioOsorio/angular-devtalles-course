<section class="country-search" [style.view-transition-name]="'country-search'">
  <div class="cs__glow cs__glow--primary" aria-hidden="true"></div>
  <div class="cs__glow cs__glow--accent" aria-hidden="true"></div>

  <div class="cs__container">
    <div class="cs__header">
      <span class="cs__badge">Busqueda</span>

      <h2 class="cs__title">
        Encuentra
        <span class="cs__title-highlight">{{ textSearch() }}</span>
      </h2>

      <p class="cs__description">
        {{ textDescription() }}
      </p>

      <label class="cs__form" aria-label="Busqueda por capital">
        <div class="cs__label">
          <span class="cs__label-text">{{ textSearch() }}</span>
        </div>
        <div class="cs__input-group">
          <input
            (keyup.enter)="onSearch(inputSearch.value)"
            #inputSearch
            type="search"
            placeholder="{{ textPlaceholder() }}"
            class="cs__input"
            aria-label="Ingresa una capital"
            [value]="value()"
          />
          <button (click)="onSearch(inputSearch.value)" type="button" class="cs__button">
            Buscar
          </button>
        </div>
      </label>
    </div>
  </div>
</section>

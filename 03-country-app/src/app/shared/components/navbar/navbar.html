<nav class="app-navbar" aria-label="Navegacion principal">
  <div class="an__container">
    <a routerLink="/" class="an__brand" aria-label="Ir al inicio"> Country App </a>

    <ul class="an__list">
      @for (item of navItems; track item.path) {
        <li class="an__item">
          <a
            [routerLink]="item.path"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            [style.view-transition-name]="linkActive.isActive ? 'nav-active-link' : null"
            #linkActive="routerLinkActive"
            routerLinkActive="an__link--active"
            class="an__link"
          >
            {{ item.label }}
          </a>
        </li>
      }

      <li class="an__item">
        <div class="dropdown dropdown-end m-0 p-0">
          <div tabindex="0" role="button" class="btn m-1">
            Theme
            <svg
              width="12px"
              height="12px"
              class="inline-block h-2 w-2 fill-current opacity-60"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 2048 2048"
            >
              <path d="M1799 349l242 241-1017 1017L7 590l242-241 775 775 775-775z"></path>
            </svg>
          </div>
          <ul
            tabindex="-1"
            class="dropdown-content bg-base-300 rounded-box z-1 w-52 p-2 shadow-2xl"
          >
            @for (theme of themes; track theme.value) {
              <li>
                <input
                  type="radio"
                  name="theme-dropdown"
                  class="theme-controller btn btn-sm btn-block btn-ghost w-full justify-start"
                  aria-label="{{ theme.label }}"
                  value="{{ theme.value }}"
                />
              </li>
            }
          </ul>
        </div>
      </li>
    </ul>
  </div>
</nav>

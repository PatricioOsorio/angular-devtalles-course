<nav
  class="border-base-300/80 bg-base-100/90 sticky top-0 z-40 border-b px-2 py-2 backdrop-blur sm:px-4"
  aria-label="Navegacion principal"
>
  <div class="mx-auto flex w-full max-w-6xl items-center gap-2">
    <a
      routerLink="/"
      class="btn btn-ghost rounded-box text-sm font-extrabold tracking-[0.2em] uppercase sm:text-base"
      aria-label="Ir al inicio"
    >
      Country App
    </a>

    <ul
      class="menu menu-horizontal menu-sm sm:menu-md rounded-box bg-base-200/70 ml-auto flex-nowrap gap-1 overflow-x-auto p-1"
    >
      @for (item of navItems; track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            [attr.aria-label]="item.ariaLabel"
            [routerLinkActiveOptions]="{ exact: true }"
            [attr.aria-current]="linkActive.isActive ? 'page' : null"
            #linkActive="routerLinkActive"
            routerLinkActive="menu-active bg-primary text-primary-content shadow-sm"
            class="font-medium whitespace-nowrap transition duration-200 hover:-translate-y-px"
          >
            {{ item.label }}
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
